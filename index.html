<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OUS - GPS PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body{
    margin:0;
    padding:0;
    height:100%;
    font-family: Arial;
}

#map{
    width:100%;
    height:100vh;
    display:none;
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.modal-box{
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    width:90%;
    max-width:400px;
}

.btn{
    margin-top:15px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#007bff;
    color:white;
}

.info{
    position:absolute;
    bottom:15px;
    left:15px;
    background:white;
    padding:10px;
    border-radius:10px;
    z-index:999;
    display:none;
}

</style>
</head>

<body>

<div class="modal" id="modal">

  <div class="modal-box">

    <h3>📍 OUS GPS ACTIVO</h3>

    <div id="estado">Iniciando GPS...</div>

    <button class="btn" id="btnContinuar" style="display:none;">
      Ver mapa
    </button>

  </div>

</div>

<div id="map"></div>

<div class="info" id="info">

<b>Técnico:</b> <span id="tec"></span><br>
<b>Destino:</b> <span id="dest"></span><br>

<button class="btn" id="navBtn">Abrir Google Maps</button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "ous-rastreo.firebaseapp.com",
  projectId: "ous-rastreo",
  storageBucket: "ous-rastreo.firebasestorage.app",
  messagingSenderId: "606108188440",
  appId: "1:606108188440:web:0416b98a7738af947ae86d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// PARAMETROS DESDE APP SHEET
const params = new URLSearchParams(window.location.search);

const correo = params.get("correo");
const latDestino = parseFloat(params.get("lat"));
const lngDestino = parseFloat(params.get("lng"));

// VALIDACION
if(!correo || !latDestino || !lngDestino){
  document.getElementById("estado").innerHTML =
  "Faltan datos (correo o coordenadas)";
  throw new Error("faltan datos");
}

document.getElementById("tec").textContent = correo;
document.getElementById("dest").textContent = `${latDestino}, ${lngDestino}`;

// MAPA
let map;
let markerTec;
let markerDest;
let ruta;

// INICIAR MAPA
function initMap(lat,lng){

  map = L.map('map').setView([lat,lng],15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(map);

  markerTec = L.marker([lat,lng]).addTo(map).bindPopup("Técnico");

  markerDest = L.marker([latDestino,lngDestino])
    .addTo(map)
    .bindPopup("Destino")
    .openPopup();

  ruta = L.polyline(
    [[lat,lng],[latDestino,lngDestino]],
    {color:'blue', weight:4}
  ).addTo(map);
}

// GPS EN TIEMPO REAL
navigator.geolocation.watchPosition(

async(pos)=>{

  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  // GUARDAR FIREBASE
  await setDoc(doc(db,"ubicaciones",correo),{
    correo,
    lat,
    lng,
    destinoLat: latDestino,
    destinoLng: lngDestino,
    fecha: new Date().toLocaleString()
  });

  // PRIMERA VEZ
  if(!map){

    initMap(lat,lng);

    document.getElementById("estado").innerHTML =
    "Ubicación lista correctamente";

    document.getElementById("btnContinuar").style.display="inline-block";
  }

  // ACTUALIZAR POSICIÓN
  if(markerTec){
    markerTec.setLatLng([lat,lng]);
    map.setView([lat,lng]);
  }

  if(ruta){
    ruta.setLatLngs([[lat,lng],[latDestino,lngDestino]]);
  }

},

(err)=>{
  document.getElementById("estado").innerHTML =
  "Error GPS: " + err.message;
},

{
  enableHighAccuracy:true,
  maximumAge:0,
  timeout:15000
}

);

// BOTÓN VER MAPA
document.getElementById("btnContinuar").onclick = ()=>{

  document.getElementById("modal").style.display="none";
  document.getElementById("map").style.display="block";
  document.getElementById("info").style.display="block";

  setTimeout(()=>map.invalidateSize(),300);
};

// GOOGLE MAPS NAV
document.getElementById("navBtn").onclick = ()=>{

  const url =
  `https://www.google.com/maps/dir/?api=1&destination=${latDestino},${lngDestino}`;

  window.open(url,"_blank");
};

</script>

</body>
</html>
