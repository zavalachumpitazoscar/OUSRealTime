<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OUS - Seguimiento GPS</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

html, body{
    margin:0;
    padding:0;
    height:100%;
    font-family: Arial, sans-serif;
}

#map{
    width:100%;
    height:100vh;
    display:none;
}

.info{
    position:absolute;
    bottom:15px;
    left:15px;
    z-index:1000;
    background:white;
    padding:12px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    display:none;
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.modal-content{
    background:white;
    width:90%;
    max-width:400px;
    border-radius:12px;
    padding:25px;
    text-align:center;
}

.modal h2{
    margin-top:0;
}

.btn{
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    margin-top:15px;
}

.estado-ok{
    color:green;
    font-weight:bold;
}

.estado-error{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<div id="modal" class="modal">

  <div class="modal-content">

      <h2>📍 Ubicación Compartida</h2>

      <div id="mensaje">
          Obteniendo ubicación...
      </div>

      <button
        id="btnContinuar"
        class="btn"
        style="display:none;"
      >
        Continuar
      </button>

  </div>

</div>

<div id="map"></div>

<div id="info" class="info">

  <b>Técnico:</b><br>
  <span id="correoTecnico"></span>

  <hr>

  <b>Última actualización:</b><br>
  <span id="ultimaFecha"></span>

  <hr>

  <span class="estado-ok">
    🟢 GPS activo
  </span>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyBz9IVIpECD16fSo5Sz2jc6SZkTJHr2bk0",
  authDomain: "ous-rastreo.firebaseapp.com",
  projectId: "ous-rastreo",
  storageBucket: "ous-rastreo.firebasestorage.app",
  messagingSenderId: "606108188440",
  appId: "1:606108188440:web:0416b98a7738af947ae86d"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const correo = params.get("correo");

if(!correo){

    document.getElementById("mensaje").innerHTML =
      "<span class='estado-error'>No se recibió el correo desde OUS.</span>";

    throw new Error("No se recibió correo.");
}

document.getElementById("correoTecnico").textContent = correo;

let map;
let marker;

function iniciarMapa(lat,lng){

    if(map) return;

    map = L.map('map').setView([lat,lng],16);

    L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
        attribution:'© OpenStreetMap'
      }
    ).addTo(map);

    marker = L.marker([lat,lng])
      .addTo(map)
      .bindPopup("Mi ubicación")
      .openPopup();
}

document.getElementById("btnContinuar").onclick = () => {

    document.getElementById("modal").style.display = "none";

    document.getElementById("map").style.display = "block";

    document.getElementById("info").style.display = "block";

    setTimeout(() => {
        map.invalidateSize();
    },300);
};

navigator.geolocation.watchPosition(

async(position)=>{

    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    const fecha = new Date().toLocaleString();

    await setDoc(
      doc(db,"ubicaciones",correo),
      {
        correo: correo,
        lat: lat,
        lng: lng,
        fecha: fecha,
        activo: true
      }
    );

    document.getElementById("ultimaFecha").textContent = fecha;

    if(!map){

        iniciarMapa(lat,lng);

        document.getElementById("mensaje").innerHTML = `
            <div class="estado-ok">
              Ubicación compartida correctamente
            </div>
            <br>
            Técnico:<br>
            <b>${correo}</b>
        `;

        document.getElementById("btnContinuar").style.display =
          "inline-block";
    }

    if(marker){

        marker.setLatLng([lat,lng]);

        map.setView([lat,lng]);
    }

},

(error)=>{

    document.getElementById("mensaje").innerHTML = `
      <div class="estado-error">
        Error GPS:
        ${error.message}
      </div>
    `;

},

{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:15000
}

);

</script>

</body>
</html>
