<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OUS GPS PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body{
  margin:0;
  padding:0;
  height:100%;
  font-family: Arial;
}

#map{
  width:100%;
  height:100vh;
  display:none;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
  width:90%;
  max-width:420px;
}

.btn{
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#007bff;
  color:white;
}

.info{
  position:absolute;
  bottom:15px;
  left:15px;
  background:white;
  padding:10px;
  border-radius:10px;
  z-index:999;
  display:none;
  font-size:14px;
}

</style>
</head>

<body>

<div class="modal" id="modal">

  <div class="modal-box">

    <h3>📍 OUS GPS PRO</h3>

    <div id="estado">Iniciando sistema...</div>

    <button class="btn" id="btnContinuar" style="display:none;">
      Ver mapa
    </button>

  </div>

</div>

<div id="map"></div>

<div class="info" id="info">

<b>Técnico:</b> <span id="tec"></span><br>
<b>Destino:</b> <span id="dest"></span><br>

<button class="btn" id="navBtn">Abrir Google Maps</button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBz9IVIpECD16fSo5Sz2jc6SZkTJHr2bk0",
  authDomain: "ous-rastreo.firebaseapp.com",
  projectId: "ous-rastreo",
  storageBucket: "ous-rastreo.firebasestorage.app",
  messagingSenderId: "606108188440",
  appId: "1:606108188440:web:0416b98a7738af947ae86d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// PARAMETROS
const params = new URLSearchParams(window.location.search);

const correo = params.get("correo");
const direccion = params.get("direccion");

// VALIDACION
if(!correo || !direccion){
  document.getElementById("estado").innerHTML =
  "Faltan datos (correo o dirección)";
  throw new Error("faltan datos");
}

document.getElementById("tec").textContent = correo;
document.getElementById("dest").textContent = direccion;

// MAPA
let map;
let markerTec;
let markerDest;
let ruta;

// ===============================
// 🔥 GEOCODING ROBUSTO
// ===============================
async function geocodificar(dir){

  if(!dir) return null;

  // 🔵 1. LIMPIEZA INTELIGENTE (Perú)
  let limpio = dir
    .replace(/Jr\.|Jiron|Av\.|Calle/gi, "")
    .replace(/\d{5}/g, "") // quita códigos postales
    .trim();

  // 🔵 2. INTENTO 1: dirección original
  let url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(dir)}`;

  let res = await fetch(url);
  let data = await res.json();

  if(data.length > 0){
    return {
      lat: parseFloat(data[0].lat),
      lng: parseFloat(data[0].lon)
    };
  }

  // 🔵 3. INTENTO 2: dirección limpia
  url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(limpio)}`;

  res = await fetch(url);
  data = await res.json();

  if(data.length > 0){
    return {
      lat: parseFloat(data[0].lat),
      lng: parseFloat(data[0].lon)
    };
  }

  // 🔵 4. INTENTO 3: solo distrito + país (fallback fuerte)
  const partes = dir.split(",");
  const fallback = partes.length > 1 ? partes.slice(1).join(",") : dir;

  url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(fallback)}`;

  res = await fetch(url);
  data = await res.json();

  if(data.length > 0){
    return {
      lat: parseFloat(data[0].lat),
      lng: parseFloat(data[0].lon)
    };
  }

  return null;
}
// ===============================
// 🗺 MAPA
// ===============================
function initMap(lat,lng){

  map = L.map('map').setView([lat,lng],15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(map);

  markerTec = L.marker([lat,lng]).addTo(map).bindPopup("Técnico");
}

// ===============================
// 🚗 RUTA REAL (OSRM)
// ===============================
async function obtenerRuta(origenLat, origenLng, destLat, destLng){

  const url =
  `https://router.project-osrm.org/route/v1/driving/` +
  `${origenLng},${origenLat};${destLng},${destLat}?overview=full&geometries=geojson`;

  const res = await fetch(url);
  const data = await res.json();

  return data.routes[0].geometry;
}

// ===============================
// 📡 GPS EN TIEMPO REAL
// ===============================
navigator.geolocation.watchPosition(

async(pos)=>{

  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  await setDoc(doc(db,"ubicaciones",correo),{
    correo,
    lat,
    lng,
    destino: direccion,
    fecha: new Date().toLocaleString()
  });

  if(!map){

    const destino = await geocodificar(direccion);

    if(!destino){
      document.getElementById("estado").innerHTML =
      "No se pudo encontrar la ubicación";
      return;
    }

    initMap(lat,lng);

    markerDest = L.marker([destino.lat,destino.lng])
      .addTo(map)
      .bindPopup("Destino");

    const geo = await obtenerRuta(lat,lng,destino.lat,destino.lng);

    ruta = L.geoJSON(geo,{
      style:{
        color:"blue",
        weight:5
      }
    }).addTo(map);

    document.getElementById("estado").innerHTML =
    "Ubicación lista con ruta real";

    document.getElementById("btnContinuar").style.display="inline-block";
  }

  if(markerTec){
    markerTec.setLatLng([lat,lng]);
    map.setView([lat,lng]);
  }

},

(err)=>{
  document.getElementById("estado").innerHTML =
  "Error GPS: " + err.message;
},

{
  enableHighAccuracy:true
}

// ===============================

);

// BOTÓN VER MAPA
document.getElementById("btnContinuar").onclick = ()=>{

  document.getElementById("modal").style.display="none";
  document.getElementById("map").style.display="block";
  document.getElementById("info").style.display="block";

  setTimeout(()=>map.invalidateSize(),300);
};

// GOOGLE MAPS
document.getElementById("navBtn").onclick = ()=>{

  navigator.geolocation.getCurrentPosition((pos)=>{

    const url =
    `https://www.google.com/maps/dir/?api=1&destination=${direccion}`;

    window.open(url,"_blank");

  });

};

</script>

</body>
</html>
