<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OUS - Compartir Ubicación</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    padding:30px;
}

.estado{
    font-size:20px;
    margin-top:20px;
}
</style>

</head>
<body>

<h2>OUS - Seguimiento GPS</h2>

<div id="correo"></div>
<div class="estado" id="estado">
Esperando ubicación...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "TU_API_KEY",
  authDomain: "ous-rastreo.firebaseapp.com",
  projectId: "ous-rastreo",
  storageBucket: "ous-rastreo.firebasestorage.app",
  messagingSenderId: "606108188440",
  appId: "1:606108188440:web:0416b98a7738af947ae86d"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);

const correo = params.get("correo");

document.getElementById("correo").innerHTML =
  "<b>Técnico:</b> " + correo;

if(!correo){

  document.getElementById("estado").innerHTML =
  "No se recibió el correo.";

  throw new Error("correo no recibido");
}

navigator.geolocation.watchPosition(

  async(position)=>{

    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    await setDoc(
      doc(db,"ubicaciones",correo),
      {
        correo: correo,
        lat: lat,
        lng: lng,
        fecha: new Date().toLocaleString()
      }
    );

    document.getElementById("estado").innerHTML =
      "Ubicación enviada correctamente";

  },

  (error)=>{

    document.getElementById("estado").innerHTML =
      "Error GPS: " + error.message;

  },

  {
    enableHighAccuracy:true,
    maximumAge:0
  }

);

</script>

</body>
</html>
