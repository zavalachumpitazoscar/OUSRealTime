<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OUS GPS PRO</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>

<body>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <h3>📍 OUS GPS PRO</h3>

    <div id="estado">Inicializando sistema...</div>

    <button class="btn" id="btnContinuar">
      Ver mapa en vivo
    </button>

  </div>
</div>

<!-- MAPA -->
<div id="map"></div>

<!-- INFO -->
<div class="info" id="info">

<b>Técnico:</b> <span id="tec"></span><br>
<span class="badge">EN TIEMPO REAL</span><br><br>

<button class="btn" id="navBtn">Abrir Google Maps</button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBz9IVIpECD16fSo5Sz2jc6SZkTJHr2bk0",
  authDomain: "ous-rastreo.firebaseapp.com",
  projectId: "ous-rastreo",
  storageBucket: "ous-rastreo.firebasestorage.app",
  messagingSenderId: "606108188440",
  appId: "1:606108188440:web:0416b98a7738af947ae86d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ======================
const params = new URLSearchParams(window.location.search);
const correo = params.get("correo");
const direccion = params.get("direccion");

if(!correo){
  document.getElementById("estado").innerHTML="Falta correo";
  throw new Error();
}

document.getElementById("tec").textContent = correo;

// ======================
let map;
let markerTec;
let markerDest;
let ruta;
let destino = null;

// ======================
// GEOCODING ROBUSTO
// ======================
async function geocodificar(dir){

  if(!dir) return null;

  let url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(dir)}`;
  let res = await fetch(url);
  let data = await res.json();

  if(data.length>0){
    return {lat:+data[0].lat,lng:+data[0].lon};
  }

  let limpio = dir.replace(/Jr\.|Av\.|Calle|Jiron/gi,"");

  url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(limpio)}`;
  res = await fetch(url);
  data = await res.json();

  if(data.length>0){
    return {lat:+data[0].lat,lng:+data[0].lon};
  }

  return null;
}

// ======================
// MAPA
// ======================
function initMap(lat,lng){

  map = L.map('map',{zoomControl:true}).setView([lat,lng],15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(map);

  markerTec = L.marker([lat,lng]).addTo(map);
}

// ======================
// RUTA POR CALLES (OSRM)
// ======================
async function obtenerRuta(oLat,oLng,dLat,dLng){

  const url =
  `https://router.project-osrm.org/route/v1/driving/` +
  `${oLng},${oLat};${dLng},${dLat}?overview=full&geometries=geojson`;

  const res = await fetch(url);
  const data = await res.json();

  if(!data.routes || data.routes.length === 0){
    return null;
  }

  return data.routes[0].geometry;
}


// ======================
// GPS
// ======================
navigator.geolocation.watchPosition(async(pos)=>{

  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  await setDoc(doc(db,"ubicaciones",correo),{
    correo,lat,lng,direccion,fecha:new Date().toLocaleString()
  });

  if(!map){

    destino = await geocodificar(direccion);

    initMap(lat,lng);

    if(destino){

  markerDest = L.marker([
    destino.lat,
    destino.lng
  ]).addTo(map);

  const geo = await obtenerRuta(
    lat,
    lng,
    destino.lat,
    destino.lng
  );

  if(geo){

  ruta = L.geoJSON(geo,{
  style:{
    color:"#2563eb",
    weight:6,
    opacity:0.9
  }
}).addTo(map);

setTimeout(()=>{
  map.fitBounds(ruta.getBounds(),{
    padding:[700,700]
  });
},300);

  }

}

    document.getElementById("estado").innerHTML =
      destino ? "Sistema listo con destino" : "Sistema activo sin destino";

  }

  if(markerTec){
    markerTec.setLatLng([lat,lng]);
  }

},(err)=>{
  document.getElementById("estado").innerHTML="GPS error: "+err.message;
},{enableHighAccuracy:true});

// ======================
// BOTÓN MAPA (FIX LEAFLET)
// ======================
document.getElementById("btnContinuar").onclick = () => {

  document.getElementById("modal").style.display = "none";

  const mapDiv = document.getElementById("map");
  const info = document.getElementById("info");

  // 🔥 IMPORTANTE: display block (NO visibility)
  mapDiv.style.display = "block";
  info.style.display = "block";

  setTimeout(() => {

    map.invalidateSize(true);

    // 🔥 fuerza recalculo real del mapa
    window.dispatchEvent(new Event("resize"));

    // opcional: centra mapa correctamente
    map.setView(map.getCenter(), map.getZoom());

  }, 500);
};

// ======================
// GOOGLE MAPS
// ======================
document.getElementById("navBtn").onclick=()=>{

  if(destino){
    window.open(
      `https://www.google.com/maps/dir/?api=1&destination=${destino.lat},${destino.lng}`
    );
  }else{
    alert("No hay destino definido");
  }
};

</script>

</body>
</html>
