<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OUS Monitor GPS</title>

<link rel="stylesheet" href="styleMonitor.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<div class="sidebar">

  <div class="sidebar-header">

    <div class="logo-container">

  <img
    src="logo.png"
    alt="OUS"
    class="logo"
  >

  <div>
    <h2>OUS Monitor</h2>
    <div class="contador" id="contador">
      0 técnicos activos
    </div>
  </div>

</div>

    <div class="contador" id="contador">
      0 técnicos activos
    </div>

  </div>

  <div class="acciones">

    <button id="btnTodos" class="btn-todos">
      🗺 Mostrar todos
    </button>

  </div>

  <div id="listaTecnicos" class="lista-tecnicos">
  </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBz9IVIpECD16fSo5Sz2jc6SZkTJHr2bk0",
  authDomain: "ous-rastreo.firebaseapp.com",
  projectId: "ous-rastreo",
  storageBucket: "ous-rastreo.firebasestorage.app",
  messagingSenderId: "606108188440",
  appId: "1:606108188440:web:0416b98a7738af947ae86d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const map = L.map('map').setView([-12.05,-77.04],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
 attribution:'© OpenStreetMap'
}
).addTo(map);

const markers = {};
const tecnicos = {};

const listaTecnicos =
document.getElementById("listaTecnicos");

const contador =
document.getElementById("contador");

function renderLista(){

  listaTecnicos.innerHTML = "";

  Object.keys(tecnicos)
  .sort()
  .forEach(id=>{

    const item =
    document.createElement("div");

    item.className = "tecnico";

    item.innerHTML = `
      <div class="nombre">
        🟢 ${id}
      </div>
    `;

    item.onclick = ()=>{

      Object.keys(markers).forEach(key=>{

        if(key !== id){
          map.removeLayer(markers[key]);
        }

      });

      markers[id].addTo(map);

      map.flyTo(
        markers[id].getLatLng(),
        16,
        {
          duration:1.5
        }
      );

      markers[id].openPopup();

    };

    listaTecnicos.appendChild(item);

  });

  contador.innerHTML =
  `${Object.keys(tecnicos).length} técnicos activos`;

}

document
.getElementById("btnTodos")
.onclick = ()=>{

  Object.values(markers)
  .forEach(marker=>{

    marker.addTo(map);

  });

};

onSnapshot(
collection(db,"ubicaciones"),
(snapshot)=>{

  snapshot.forEach((doc)=>{

    const data = doc.data();

    const id = data.correo;

    if(!data.lat || !data.lng) return;

    tecnicos[id] = data;

    if(!markers[id]){

      markers[id] = L.marker([
        data.lat,
        data.lng
      ])
      .addTo(map)
      .bindPopup(`
        <b>${id}</b><br>
        ${data.fecha}
      `);

    }else{

      markers[id].setLatLng([
        data.lat,
        data.lng
      ]);

      markers[id].setPopupContent(`
        <b>${id}</b><br>
        ${data.fecha}
      `);

    }

  });

  renderLista();

});

</script>

</body>
</html>
